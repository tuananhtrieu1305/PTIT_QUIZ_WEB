<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo – Hệ thống thi trực tuyến PTIT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --red: #c41d23;
            --dark: #111827;
            --surface: #1e2535;
            --muted: #6b7280;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: "Be Vietnam Pro", sans-serif;
            background: var(--dark);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1rem;
        }

        .brand-dot {
            width: 28px;
            height: 28px;
            background: var(--red);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        
        .dots {
            display: flex;
            gap: 6px;
            flex: 1;
            justify-content: center;
            flex-wrap: wrap;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: 0.25s;
        }

        .dot.active {
            background: var(--red);
            transform: scale(1.4);
        }

        .dot:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-ctrl {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-ctrl:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-ctrl.active {
            background: var(--red);
            border-color: var(--red);
        }

        
        .counter {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.5);
            white-space: nowrap;
        }

        
        .stage {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        
        .sidebar {
            width: 220px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .thumb {
            border-radius: 8px;
            border: 2px solid transparent;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .thumb:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .thumb.active {
            border-color: var(--red);
            background: rgba(196, 29, 35, 0.12);
        }

        .thumb-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .thumb.active .thumb-num {
            background: var(--red);
        }

        .thumb-info {
            flex: 1;
            min-width: 0;
        }

        .thumb-title {
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .thumb-sub {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 2px;
        }

        
        .viewer {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        iframe.visible {
            opacity: 1;
        }

        
        .progress-bar {
            height: 3px;
            background: var(--red);
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            transition: width linear;
            z-index: 10;
        }

        
        .autoplay-label {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>

    
    <div class="topbar">
        <div class="brand">
            <div class="brand-dot">🎓</div>
            PTIT Demo
        </div>

        <div class="dots" id="dots"></div>

        <div class="controls">
            <span class="counter" id="counter">1 / 8</span>
            <button class="btn-ctrl" id="btn-prev">◀ Trước</button>
            <button class="btn-ctrl" id="btn-next">Tiếp ▶</button>
            <button class="btn-ctrl" id="btn-auto">▶ Tự động</button>
            <span class="autoplay-label" id="auto-label"></span>
        </div>
    </div>

    
    <div class="stage">
        
        <div class="sidebar" id="sidebar"></div>

        
        <div class="viewer">
            <div class="progress-bar" id="progress"></div>
            <iframe id="frame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const slides = [
            { title: "Đăng nhập", sub: "Screen 1", url: "./screen_1_&_2/login.html" },
            { title: "Đăng ký", sub: "Screen 1b", url: "./screen_1_&_2/register.html" },
            { title: "Trang chủ", sub: "Screen 2", url: "./screen_1_&_2/home.html" },
            { title: "Làm bài thi", sub: "Screen 3", url: "./screen_3_&_4/screen3.html" },
            { title: "Kết quả thi", sub: "Screen 4", url: "./screen_3_&_4/screen4.html" },
            { title: "Admin Dashboard", sub: "Screen 5&6", url: "./screen_5_&_6/index.html" },
            { title: "Quản lý kỳ thi", sub: "Screen 7", url: "./screen_7_&_8/screen7.html" },
            { title: "Quản lý sinh viên", sub: "Screen 8", url: "./screen_7_&_8/screen8.html" },
        ];

        let current = 0;
        let autoPlay = false;
        let autoTimer = null;
        const AUTO_DURATION = 8000; 

        const frame = document.getElementById('frame');
        const dotsEl = document.getElementById('dots');
        const sidebarEl = document.getElementById('sidebar');
        const counterEl = document.getElementById('counter');
        const progressEl = document.getElementById('progress');
        const btnAuto = document.getElementById('btn-auto');
        const autoLabel = document.getElementById('auto-label');

        
        slides.forEach((s, i) => {
            
            const d = document.createElement('div');
            d.className = 'dot';
            d.title = s.title;
            d.addEventListener('click', () => goTo(i));
            dotsEl.appendChild(d);

            
            const t = document.createElement('div');
            t.className = 'thumb';
            t.innerHTML = `
      <div class="thumb-num">${i + 1}</div>
      <div class="thumb-info">
        <div class="thumb-title">${s.title}</div>
        <div class="thumb-sub">${s.sub}</div>
      </div>`;
            t.addEventListener('click', () => goTo(i));
            sidebarEl.appendChild(t);
        });

        function goTo(index) {
            current = (index + slides.length) % slides.length;
            render();
            if (autoPlay) startAutoPlay(); 
        }

        function render() {
            
            frame.classList.remove('visible');
            setTimeout(() => {
                frame.src = slides[current].url;
                frame.onload = () => frame.classList.add('visible');
            }, 150);

            
            dotsEl.querySelectorAll('.dot').forEach((d, i) =>
                d.classList.toggle('active', i === current));

            
            sidebarEl.querySelectorAll('.thumb').forEach((t, i) => {
                t.classList.toggle('active', i === current);
                if (i === current) t.scrollIntoView({ block: 'nearest' });
            });

            
            counterEl.textContent = `${current + 1} / ${slides.length}`;
        }

        
        function startAutoPlay() {
            clearInterval(autoTimer);
            progressEl.style.transition = 'none';
            progressEl.style.width = '0%';
            requestAnimationFrame(() => {
                progressEl.style.transition = `width ${AUTO_DURATION}ms linear`;
                progressEl.style.width = '100%';
            });
            autoTimer = setInterval(() => {
                current = (current + 1) % slides.length;
                render();
                
                progressEl.style.transition = 'none';
                progressEl.style.width = '0%';
                requestAnimationFrame(() => {
                    progressEl.style.transition = `width ${AUTO_DURATION}ms linear`;
                    progressEl.style.width = '100%';
                });
            }, AUTO_DURATION);
        }

        function stopAutoPlay() {
            clearInterval(autoTimer);
            progressEl.style.transition = 'none';
            progressEl.style.width = '0%';
            autoLabel.textContent = '';
        }

        btnAuto.addEventListener('click', () => {
            autoPlay = !autoPlay;
            btnAuto.classList.toggle('active', autoPlay);
            btnAuto.textContent = autoPlay ? '⏸ Tạm dừng' : '▶ Tự động';
            if (autoPlay) {
                autoLabel.textContent = `(${AUTO_DURATION / 1000}s / trang)`;
                startAutoPlay();
            } else {
                stopAutoPlay();
            }
        });

        document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
        document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));

        
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
            if (e.key === ' ') { e.preventDefault(); btnAuto.click(); }
        });

        
        render();
    </script>
</body>

</html>
