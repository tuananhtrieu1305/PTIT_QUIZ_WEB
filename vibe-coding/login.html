<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | PTIT Exam Portal</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        .auth-layout {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .auth-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(244, 63, 94, 0.15), transparent 40%),
                radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.15), transparent 40%);
            z-index: 0;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), #e11d48);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            margin: 0 auto 20px;
            box-shadow: var(--shadow-glow);
        }

        .auth-header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            margin-left: 5px;
        }

        .auth-footer a:hover {
            text-decoration: underline;
            color: #fb7185;
        }
    </style>
</head>

<body>
    <div class="auth-layout">
        <div class="auth-bg"></div>
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <div class="auth-logo">P</div>
                <h1>Chào mừng trở lại</h1>
                <p>Đăng nhập vào hệ thống thi trực tuyến PTIT</p>
            </div>

            <form action="./home.html">
                <div class="input-group">
                    <label>Tên đăng nhập / Mã SV</label>
                    <input type="text" class="input-control" placeholder="B20DCCN001" required>
                </div>

                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" class="input-control" placeholder="••••••••" required>
                </div>

                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-size: 0.85rem;">
                    <label
                        style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-muted)">
                        <input type="checkbox" style="width:16px; height:16px; cursor:pointer;"> Ghi nhớ tôi
                    </label>
                    <a href="#" style="color: var(--text-muted); transition: 0.3s;">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1rem; padding: 14px;">
                    Đăng nhập
                    <span style="margin-left:8px">→</span>
                </button>
            </form>

            <div class="auth-footer">
                Chưa có tài khoản? <a href="./register.html">Tạo tài khoản mới</a>
            </div>
        </div>
    </div>
</body>

</html>
