<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibecoding Demo – PTIT Exam Portal</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: #09090b;
            /* pure dark */
        }

        /* ── TOP BAR ── */
        .demo-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 64px;
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 16px;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            font-family: var(--font-heading);
        }

        .brand-dot {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), #e11d48);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: var(--shadow-glow);
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-ctrl {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-family: var(--font-heading);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-ctrl:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-ctrl.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
        }

        .counter {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            font-family: var(--font-heading);
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 8px;
        }

        /* ── SLIDE PANEL ── */
        .stage {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Thumbnails sidebar */
        .demo-sidebar {
            width: 260px;
            flex-shrink: 0;
            background: rgba(24, 24, 27, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .thumb {
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .thumb:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .thumb.active {
            border-color: var(--primary);
            background: rgba(244, 63, 94, 0.1);
        }

        .thumb-num {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: var(--font-heading);
            color: var(--text-muted);
            flex-shrink: 0;
            transition: var(--transition);
        }

        .thumb.active .thumb-num {
            background: var(--primary);
            color: #fff;
            box-shadow: var(--shadow-glow);
        }

        .thumb-info {
            flex: 1;
            min-width: 0;
        }

        .thumb-title {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        .thumb-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* iframe wrapper */
        .viewer {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-base);
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(0.98);
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        iframe.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* Progress bar */
        .progress-bar {
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            transition: width linear;
            z-index: 10;
            box-shadow: var(--shadow-glow);
        }
    </style>
</head>

<body>

    <div class="demo-topbar">
        <div class="brand">
            <div class="brand-dot">✦</div>
            <div style="display:flex; flex-direction:column;">
                <span>Vibecoding Demo</span>
                <span style="font-size:0.75rem; color:var(--text-muted); font-weight:500;">Premium Aesthetics
                    Edition</span>
            </div>
        </div>

        <div class="controls">
            <span class="counter" id="counter">1 / 12</span>
            <button class="btn-ctrl" id="btn-prev">← Previous</button>
            <button class="btn-ctrl" id="btn-next">Next →</button>
            <button class="btn-ctrl" id="btn-auto">▶ Auto-Play</button>
        </div>
    </div>

    <div class="stage">
        <div class="demo-sidebar" id="sidebar"></div>

        <div class="viewer">
            <div class="progress-bar" id="progress"></div>
            <iframe id="frame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const slides = [
            { title: "Đăng nhập", sub: "Auth Screen", url: "./login.html" },
            { title: "Đăng ký", sub: "Auth Screen", url: "./register.html" },
            { title: "Trang chủ", sub: "Student Dash", url: "./home.html" },
            { title: "Làm bài thi", sub: "Exam UI", url: "./exam.html" },
            { title: "Kết quả thi", sub: "Exam Review", url: "./result.html" },
            { title: "Đăng nhập Admin", sub: "Admin Auth", url: "./admin-login.html" },
            { title: "Admin Tổng quan", sub: "Admin Dash", url: "./admin.html" },
            { title: "Quản lý kỳ thi", sub: "Admin Mngt", url: "./exams.html" },
            { title: "Biên tập kỳ thi", sub: "Exam Edit", url: "./admin-exam-edit.html" },
            { title: "Quản lý sinh viên", sub: "Admin Mngt", url: "./students.html" },
            { title: "Hồ sơ Sinh viên", sub: "Student Detail", url: "./admin-student-detail.html" },
            { title: "Báo cáo Thống kê", sub: "Statistics", url: "./admin-stats.html" },
        ];

        let current = 0;
        let autoPlay = false;
        let autoTimer = null;
        const AUTO_DURATION = 10000; // 10s per slide for vibe mode

        const frame = document.getElementById('frame');
        const sidebarEl = document.getElementById('sidebar');
        const counterEl = document.getElementById('counter');
        const progressEl = document.getElementById('progress');
        const btnAuto = document.getElementById('btn-auto');

        slides.forEach((s, i) => {
            const t = document.createElement('div');
            t.className = 'thumb';
            t.innerHTML = `
      <div class="thumb-num">${i + 1}</div>
      <div class="thumb-info">
        <div class="thumb-title">${s.title}</div>
        <div class="thumb-sub">${s.sub}</div>
      </div>`;
            t.addEventListener('click', () => goTo(i));
            sidebarEl.appendChild(t);
        });

        function goTo(index) {
            current = (index + slides.length) % slides.length;
            render();
            if (autoPlay) startAutoPlay();
        }

        function render() {
            frame.classList.remove('visible');
            setTimeout(() => {
                frame.src = slides[current].url;
                frame.onload = () => frame.classList.add('visible');
            }, 200);

            sidebarEl.querySelectorAll('.thumb').forEach((t, i) => {
                t.classList.toggle('active', i === current);
                if (i === current) t.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });

            counterEl.textContent = `${current + 1} / ${slides.length}`;
        }

        function startAutoPlay() {
            clearInterval(autoTimer);
            progressEl.style.transition = 'none';
            progressEl.style.width = '0%';
            requestAnimationFrame(() => {
                progressEl.style.transition = `width ${AUTO_DURATION}ms linear`;
                progressEl.style.width = '100%';
            });
            autoTimer = setInterval(() => {
                current = (current + 1) % slides.length;
                render();
                progressEl.style.transition = 'none';
                progressEl.style.width = '0%';
                requestAnimationFrame(() => {
                    progressEl.style.transition = `width ${AUTO_DURATION}ms linear`;
                    progressEl.style.width = '100%';
                });
            }, AUTO_DURATION);
        }

        function stopAutoPlay() {
            clearInterval(autoTimer);
            progressEl.style.transition = 'none';
            progressEl.style.width = '0%';
        }

        btnAuto.addEventListener('click', () => {
            autoPlay = !autoPlay;
            btnAuto.classList.toggle('active', autoPlay);
            btnAuto.innerHTML = autoPlay ? '⏸ Pause' : '▶ Auto-Play';
            if (autoPlay) startAutoPlay(); else stopAutoPlay();
        });

        document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
        document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
            if (e.key === ' ') { e.preventDefault(); btnAuto.click(); }
        });

        render();
    </script>
</body>

</html>
