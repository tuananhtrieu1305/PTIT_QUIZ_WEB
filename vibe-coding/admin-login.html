<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | PTIT Portal</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        .auth-layout {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .auth-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.15), transparent 40%), radial-gradient(circle at bottom, rgba(139, 92, 246, 0.15), transparent 40%);
            z-index: 0;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            border-top: 3px solid var(--accent);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .auth-header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <div class="auth-layout">
        <div class="auth-bg"></div>
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <div class="auth-logo">A</div>
                <h1>Hệ Thống Quản Trị</h1>
                <p>Đăng nhập bằng tài khoản Admin / Giảng viên</p>
            </div>

            <form action="./admin.html">
                <div class="input-group">
                    <label>Tên đăng nhập / Email</label>
                    <input type="text" class="input-control" placeholder="admin@ptit.edu.vn" required>
                </div>

                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" class="input-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; font-size: 1rem; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--secondary)); box-shadow: 0 4px 15px rgba(59,130,246, 0.3);">
                    Đăng nhập quản trị
                    <span style="margin-left:8px">→</span>
                </button>
            </form>

            <div style="text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted);">
                <a href="./login.html" style="color: var(--text-muted); text-decoration: underline;">← Trở về đăng nhập
                    sinh viên</a>
            </div>
        </div>
    </div>
</body>

</html>
